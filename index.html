<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elevie Travel</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; font-size: 14px; background: #F5F0E8; color: #1B3A4B; min-height: 100vh; }
#login { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #1B3A4B; padding: 24px; }
.card { background: #F5F0E8; border-radius: 20px; padding: 40px 32px; width: 100%; max-width: 380px; }
.logo { text-align: center; margin-bottom: 32px; }
.logo h1 { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300; color: #1B3A4B; letter-spacing: 2px; }
.logo p { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #B8905A; margin-top: 6px; }
.line { width: 40px; height: 1px; background: #B8905A; margin: 10px auto; opacity: 0.5; }
label { display: block; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: #5a7080; margin-bottom: 5px; }
input { width: 100%; padding: 11px 13px; border: 1.5px solid #EDE7D8; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: #1B3A4B; background: #fff; outline: none; margin-bottom: 14px; }
input:focus { border-color: #B8905A; }
button#btn-login { width: 100%; padding: 13px; background: #1B3A4B; color: #F5F0E8; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; }
button#btn-login:disabled { opacity: 0.6; }
#msg { background: #fde8e8; color: #C0392B; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; display: none; }
#app { display: none; padding: 20px; }
.header { background: #1B3A4B; color: #F5F0E8; padding: 16px 20px; margin: -20px -20px 20px; display: flex; justify-content: space-between; align-items: center; }
.header h2 { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; }
.header button { background: rgba(255,255,255,0.15); border: none; color: #F5F0E8; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 12px; }
</style>
</head>
<body>

<div id="login">
  <div class="card">
    <div class="logo">
      <h1>Elevie</h1>
      <div class="line"></div>
      <p>Travel - Cotizaciones</p>
    </div>
    <div id="msg"></div>
    <div>
      <label>Correo</label>
      <input type="email" id="email" placeholder="nombre@elevietravel.com">
      <label>Contrasena</label>
      <input type="password" id="pass">
      <button type="button" id="btn-login">Entrar</button>
    </div>
  </div>
</div>

<div id="app">
  <div class="header">
    <h2>Elevie Travel</h2>
    <button type="button" id="btn-logout">Salir</button>
  </div>
  <p id="welcome" style="font-size:16px;color:#1B3A4B;">Bienvenida</p>
</div>

<script>
(function() {
  var SURL = 'https://ibdvwntcahiodeujkozb.supabase.co';
  var SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImliZHZ3bnRjYWhpb2RldWprb3piIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NzA2ODcsImV4cCI6MjA5MDI0NjY4N30.WRf0oAdoOZ-53P-zQx_mKswdw0e0yPqfL8KRbjq5GLk';

  var client = supabase.createClient(SURL, SKEY);

  function showMsg(text) {
    var el = document.getElementById('msg');
    el.textContent = text;
    el.style.display = text ? 'block' : 'none';
  }

  function showApp(user) {
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('welcome').textContent = 'Bienvenida, ' + (user.email || '');
  }

  function showLogin() {
    document.getElementById('login').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }

  // Check session on load
  client.auth.getSession().then(function(result) {
    if (result.data && result.data.session && result.data.session.user) {
      showApp(result.data.session.user);
    }
  });

  // Auth state listener
  client.auth.onAuthStateChange(function(event, session) {
    if (session && session.user) {
      showApp(session.user);
    } else {
      showLogin();
    }
  });

  // Login button
  document.getElementById('btn-login').addEventListener('click', function() {
    var email = document.getElementById('email').value.trim();
    var pass = document.getElementById('pass').value;

    if (!email || !pass) {
      showMsg('Ingresa tu correo y contrasena.');
      return;
    }

    var btn = document.getElementById('btn-login');
    btn.disabled = true;
    btn.textContent = 'Entrando...';
    showMsg('');

    client.auth.signInWithPassword({ email: email, password: pass })
      .then(function(result) {
        btn.disabled = false;
        btn.textContent = 'Entrar';
        if (result.error) {
          var m = result.error.message || '';
          if (m.indexOf('Invalid') >= 0 || m.indexOf('credentials') >= 0) {
            showMsg('Correo o contrasena incorrectos.');
          } else if (m.indexOf('confirm') >= 0) {
            showMsg('Confirma tu correo antes de entrar.');
          } else {
            showMsg('Error: ' + m);
          }
        }
      })
      .catch(function(err) {
        btn.disabled = false;
        btn.textContent = 'Entrar';
        showMsg('Error de conexion: ' + (err.message || 'intenta de nuevo'));
      });
  });

  // Logout
  document.getElementById('btn-logout').addEventListener('click', function() {
    client.auth.signOut();
  });

})();
</script>

</body>
</html>
